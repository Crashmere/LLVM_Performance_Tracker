# Shared settings used by both simple matrix mode and explicit experiment mode.
project:
  base_dir: "~/msc/auto"
  # default_platform: "eidf-vm"

# If the `label` is omitted, a timestamp label is generated automatically.
# label: "baseline"

build:
  ninja_jobs: 6
  clean_build: false
  reconfigure: true

repositories:
  llvm: "https://github.com/llvm/llvm-project.git"
  official: "https://github.com/llvm/llvm-test-suite.git"
  raja: "https://github.com/LLNL/RAJAPerf.git"

compilers:
  host:
    c: "gcc"
    cxx: "g++"

suite_defaults:
  official:
    cxx_standard: "17"
  raja:
    cxx_standard: "17"

# test_selection:
#   official:
#     filters:
#       - "TSVC"
#     lit_args: []
#   raja:
#     kernels:
#       - "Basic_DAXPY"
#     extra_args: []

# Example: exclude selected tests or kernels instead.

test_selection:
  official:
    filters:
      - "TSVC"
    excluded:
      - "TSVC/Loop"
    lit_args: []
  raja:
    kernels:
      - "Basic"
    excluded:
      - "Basic_DAXPY"
    extra_args: []


# Mode 1: simple matrix mode.
# Leave `experiments` commented out to enable this mode.
#
# The workflow expands the cartesian product of:
#   llvm.tags x test_suite.official.tags x test_suite.raja.tags

llvm:
  tags:
    - "llvmorg-21.1.0"

test_suite:
  official:
    tags:
      - "llvmorg-21.1.0"

  raja:
    tags:
      - "v2025.12.0"


# Mode 2: explicit experiment mode.
# Uncomment this block and optionally comment out Mode 1 fields to enable
# explicit mode. Shared settings above still apply.
#
# experiments:
#   - llvm_tag: "llvmorg-21.1.0"
#     official_tag: "llvmorg-21.1.0"
#     raja_tag: "v2025.03.0"
#
#   - llvm_tag: "llvmorg-21.1.0"
#     official_tag: "llvmorg-21.1.0"
#     raja_tag: "v2025.12.0"
