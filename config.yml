# Shared settings used by both simple matrix mode and explicit experiment mode.
project:
  base_dir: "~/msc/auto"
  # default_platform: "eidf-vm"

build:
  ninja_jobs: 6
  clean_build: false
  reconfigure: true

repositories:
  llvm: "https://github.com/llvm/llvm-project.git"
  official: "https://github.com/llvm/llvm-test-suite.git"
  raja: "https://github.com/LLNL/RAJAPerf.git"

compilers:
  host:
    c: "gcc"
    cxx: "g++"

suite_defaults:
  official:
    cxx_standard: "17"
  raja:
    cxx_standard: "17"

test_selection:
  official:
    lit_args: []
  raja:
    extra_args: []


# Test selection: subset/smoke example.
# Comment out the `test_selection` block above and uncomment this block to use
# a smaller benchmark subset. Use a distinct run label for formal experiments
# when switching between full and subset selections.
#
# test_selection:
#   official:
#     lit_args:
#       - "--filter"
#       - "TSVC"
#   raja:
#     extra_args:
#       - "--kernels"
#       - "Basic_DAXPY"
#

# Mode 1: simple matrix mode.
# Leave `experiments` commented out to enable this mode.
#
# The workflow expands the cartesian product of:
#   llvm.tags x test_suite.official.tags x test_suite.raja.tags x runs.labels
#
# If runs.labels is omitted, a timestamp run label is generated automatically.
runs:
  # labels:
  #   - "baseline"
  repeat_count: 1

llvm:
  tags:
    - "llvmorg-21.1.0"

test_suite:
  official:
    tags:
      - "llvmorg-21.1.0"

  raja:
    tags:
      - "v2025.12.0"


# Mode 2: explicit experiment mode.
# Uncomment this block and optionally comment out Mode 1 fields to enable
# explicit mode. Shared settings above still apply.
#
# experiments:
#   - llvm_tag: "llvmorg-21.1.0"
#     official_tag: "llvmorg-21.1.0"
#     raja_tag: "v2025.12.0"
#     run_label: "baseline"
#
#   - llvm_tag: "llvmorg-21.1.0"
#     official_tag: "llvmorg-21.1.0"
#     raja_tag: "v2025.12.0"
#     run_label: "baseline"
#     repeat_count: 3
